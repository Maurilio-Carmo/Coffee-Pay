<div class="card" id="pix-card">
  <div class="card-title">☕ PIX — Escaneie ou copie</div>

  <div class="amounts" id="amounts-container"></div>

  <div class="outros-input-wrap" id="outrosWrap">
    <label for="outrosInput">Digite o valor (R$)</label>
    <input
      type="number"
      class="outros-input"
      id="outrosInput"
      placeholder="Ex: 50"
      min="1"
      max="10000"
      step="0.01"
    />
  </div>

  <div class="qr-wrapper">
    <div class="qr-valor" id="qrValor" aria-live="polite" aria-atomic="true">R$ 5,00</div>

    <div class="qr-box" id="qrBox" role="img" aria-label="QR Code PIX para pagamento">
      <div id="qrcode"></div>
    </div>

    <div class="qr-instruction">
      <strong>Como pagar pelo QR Code</strong>
      Abra o app do seu banco → PIX → Pagar com QR Code → aponte a câmera
    </div>

    <button class="copy-btn" id="copyBtn" aria-label="Copiar código PIX copia e cola">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <rect x="9" y="9" width="13" height="13" rx="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      Copiar código PIX (Copia e Cola)
    </button>

    <p class="pix-name">Beneficiário: <strong id="pix-beneficiary"></strong></p>
  </div>
</div>
